name: Bluesky Link Card Poster
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      account_row:
        description: >
          OPTIONAL. Leave blank to auto-claim the next free Sheet1 row and
          bind it to this repo permanently. Fill in only to force this run
          onto a specific row number.
        required: false
        default: ""
concurrency:
  group: bluesky-linkcard-poster
  cancel-in-progress: false
jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib atproto Pillow requests beautifulsoup4
      - name: Run link-card poster loop
        run: python -u 3inpost.py
        env:
          PYTHONUNBUFFERED: "1"
          # No "|| '1'" fallback on purpose — same reasoning as the media
          # poster: an empty ACCOUNT_ROW means "auto-assign", not "row 1".
          ACCOUNT_ROW: ${{ github.event.inputs.account_row || vars.ACCOUNT_ROW }}
      - name: Disable workflow on permanent failure
        if: failure()
        run: gh workflow disable "${{ github.workflow }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
